name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  # ── 1. 버전 계산 & 태그 생성 ────────────────────────────────────────────────
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      tag:     ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          # grep exits 1 when no tags exist — || true prevents pipefail from aborting
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          LATEST="${LATEST:-v0.0.0}"
          echo "Previous tag: $LATEST"

          # Pure bash splitting — avoids sed/cut pipefail edge cases
          VER="${LATEST#v}"
          MAJOR="${VER%%.*}"; VER="${VER#*.}"
          MINOR="${VER%%.*}"
          PATCH="${VER#*.}"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          VER="${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$TAG"     >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Next version: $TAG"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  # ── 2-A. Windows 빌드 ────────────────────────────────────────────────────────
  build-windows:
    needs: compute-version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm build/llmcreditmonitor.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ needs.compute-version.outputs.version }} build\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename standalone exe
        shell: powershell
        run: Rename-Item dist\LLMCreditMonitor.exe "LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-windows.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: |
            dist/LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-windows.exe
            dist/LLMCreditMonitor-Setup-${{ needs.compute-version.outputs.version }}.exe

  # ── 2-B. Ubuntu 빌드 ─────────────────────────────────────────────────────────
  build-linux:
    needs: compute-version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libappindicator3-1 \
            libayatana-appindicator3-1 \
            gir1.2-appindicator3-0.1 \
            gir1.2-ayatanaappindicator3-0.1 \
            libgirepository1.0-dev \
            gobject-introspection \
            libcairo2-dev \
            pkg-config \
            python3-dev \
            dpkg-dev fakeroot \
            || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller PyGObject

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm build/llmcreditmonitor.spec

      - name: Build .deb package
        run: bash build/build_linux.sh ${{ needs.compute-version.outputs.version }}

      - name: Rename standalone binary
        run: mv dist/LLMCreditMonitor dist/LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist/LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-linux
            dist/llmcreditmonitor_${{ needs.compute-version.outputs.version }}_amd64.deb

  # ── 3. GitHub Release 생성 ───────────────────────────────────────────────────
  release:
    needs: [compute-version, build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LLM Credit Monitor ${{ needs.compute-version.outputs.tag }}
          tag_name: ${{ needs.compute-version.outputs.tag }}
          draft: false
          generate_release_notes: true
          body: |
            ## 설치 및 실행 방법

            ### Windows

            **인스톨러 (권장)**
            1. `LLMCreditMonitor-Setup-${{ needs.compute-version.outputs.version }}.exe` 다운로드
            2. 실행 후 설치 마법사 진행
            3. 설치 완료 후 자동 시작 (시스템 트레이에 아이콘 표시)

            **단독 실행 파일**
            1. `LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-windows.exe` 다운로드
            2. 더블클릭으로 바로 실행 (설치 불필요)

            > ⚠️ **자동 시작 등록 전 주의 (단독 실행 파일)**
            > 설정에서 "로그인 시 자동 시작"을 켜면 **현재 파일 경로**가 레지스트리에 기록됩니다.
            > 파일을 나중에 이동하면 자동 시작이 동작하지 않으므로, **최종 위치에 파일을 놓은 뒤** 자동 시작을 등록하세요.

            ---

            ### Ubuntu / Debian

            **.deb 패키지 (권장)**

            > ⚠️ **실행 전 필수: 시스템 트레이 라이브러리 설치**
            > 미설치 시 `UnicodeEncodeError`가 발생하며 앱이 시작되지 않습니다.
            > ```bash
            > sudo apt-get install libayatana-appindicator3-1
            > # 또는
            > sudo apt-get install libappindicator3-1
            > ```

            ```bash
            sudo dpkg -i llmcreditmonitor_${{ needs.compute-version.outputs.version }}_amd64.deb
            sudo apt-get install -f   # 의존성 자동 해결
            llmcreditmonitor &
            ```

            **단독 실행 파일**
            ```bash
            chmod +x LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-linux
            ./LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-linux &
            ```

            > ⚠️ **자동 시작 등록 전 주의 (단독 실행 파일)**
            > 설정에서 "로그인 시 자동 시작"을 켜면 **현재 파일 위치**가 `~/.config/autostart/`에 기록됩니다.
            > 파일을 나중에 이동하면 자동 시작이 동작하지 않으므로, **최종 위치에 파일을 놓은 뒤** 자동 시작을 등록하세요.
            > ```bash
            > # 권장: 고정 경로로 먼저 이동
            > mv LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-linux ~/.local/bin/llmcreditmonitor
            > chmod +x ~/.local/bin/llmcreditmonitor
            > ~/.local/bin/llmcreditmonitor &
            > # 이후 설정 → 로그인 시 자동 시작 활성화
            > ```
          files: |
            dist/LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-windows.exe
            dist/LLMCreditMonitor-Setup-${{ needs.compute-version.outputs.version }}.exe
            dist/LLMCreditMonitor-${{ needs.compute-version.outputs.version }}-linux
            dist/llmcreditmonitor_${{ needs.compute-version.outputs.version }}_amd64.deb
