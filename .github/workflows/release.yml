name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.0.1
          VER="${TAG#v}"                    # e.g. 0.0.1
          echo "tag=$TAG"   >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm build/llmcreditmonitor.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.version.outputs.version }} build\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename standalone exe with version
        shell: powershell
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          Rename-Item dist\LLMCreditMonitor.exe "LLMCreditMonitor-$ver.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LLM Credit Monitor ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/LLMCreditMonitor-${{ steps.version.outputs.version }}.exe
            dist/LLMCreditMonitor-Setup-${{ steps.version.outputs.version }}.exe
