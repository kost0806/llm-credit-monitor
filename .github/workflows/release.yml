name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          # Latest semver tag, default to v0.0.0 if none exists
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST="${LATEST:-v0.0.0}"
          echo "Previous tag: $LATEST"

          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          VER="${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$TAG"   >> $GITHUB_OUTPUT
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Next version: $TAG"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm build/llmcreditmonitor.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.version.outputs.version }} build\installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename standalone exe with version
        shell: powershell
        run: |
          Rename-Item dist\LLMCreditMonitor.exe "LLMCreditMonitor-${{ steps.version.outputs.version }}.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LLM Credit Monitor ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/LLMCreditMonitor-${{ steps.version.outputs.version }}.exe
            dist/LLMCreditMonitor-Setup-${{ steps.version.outputs.version }}.exe
